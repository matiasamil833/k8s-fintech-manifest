apiVersion: v1
kind: PersistentVolume
metadata:
  name: database-pv
  namespace: fintech-db
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-084a58c7adf54cd92 # <-- Replace with your EFS File System ID